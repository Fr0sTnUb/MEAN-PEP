<div class="container mx-auto p-4 max-w-lg">
  <h1 class="text-3xl font-bold mb-4">Todo List</h1>

  <div class="flex gap-2 mb-4">
    <input
      type="text"
      [value]="newTodoTitle"
      (input)="newTodoTitle = $any($event.target).value"
      (keyup.enter)="addTodo()"
      placeholder="Add a new todo"
      class="border p-2 rounded w-full"
    />
    <button
      (click)="addTodo()"
      class="bg-blue-500 text-white px-4 rounded shrink-0"
    >
      Add
    </button>
  </div>

  <ul>
    @for (todo of todos; track todo.id) {
      <li class="flex items-center mb-2">
        <input
          type="checkbox"
          [checked]="todo.completed"
          (change)="toggleTodoCompletion(todo)"
          class="mr-2"
        />
        <span [class.line-through]="todo.completed" class="flex-1">
          {{ todo.title }}
        </span>
        <button
          (click)="removeTodo(todo)"
          class="bg-red-500 text-white p-1 rounded ml-2"
        >
          Delete
        </button>
      </li>
    } @empty {
      <li class="text-gray-400 text-sm">No todos yet — add one above.</li>
    }
  </ul>
</div>
